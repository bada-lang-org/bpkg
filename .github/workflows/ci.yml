name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck bin/bpkg make.sh

  test-commands:
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl git

      - name: Make bpkg executable
        run: chmod +x bin/bpkg

      - name: Test --version
        run: ./bin/bpkg --version

      - name: Test --help
        run: ./bin/bpkg --help

      - name: Test update (fetch registry)
        run: |
          export HOME=$(mktemp -d)
          ./bin/bpkg update

      - name: Test list (empty)
        run: |
          export HOME=$(mktemp -d)
          export PREFIX=$(mktemp -d)
          ./bin/bpkg list

      - name: Test install + list
        run: |
          export HOME=$(mktemp -d)
          export PREFIX=$(mktemp -d)
          ./bin/bpkg install math
          ./bin/bpkg list
